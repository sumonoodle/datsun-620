# Live pipeline test on the development branch: runs the full daily pipeline
# (real eBay + BaT collection, real FX) in the workflow workspace WITHOUT
# committing data. Proves collectors work before changes reach main.

name: branch-pipeline-test

on:
  push:
    branches: [claude/datsun-620-kickoff-ah5cyw]
    paths:
      - .github/workflows/ebay-check.yml
      - scrapers/**

permissions:
  contents: read

jobs:
  live-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Run tests
        run: |
          python scrapers/tests/test_fx.py
          python scrapers/tests/test_schema.py
          python scrapers/tests/test_king_cab.py
          python scrapers/tests/test_listings.py
          python scrapers/tests/test_tier2.py
          python scrapers/tests/test_japan.py
          python scrapers/tests/test_isolation.py
      - name: eBay credential self-test
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scrapers/listings/ebay_auth.py --self-test
      - name: Run full pipeline live (no commit)
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          python scrapers/run_daily.py
          echo "--- run log ---"
          cat data/run-log.json
          echo "--- changes ---"
          cat data/changes-latest.json
