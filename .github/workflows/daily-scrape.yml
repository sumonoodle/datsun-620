# Daily pipeline: FX fetch, listing scrapers (per-source isolation), change
# detection, data commit, then site deploy. Digest send is added in M4.
#
# Cron timing: the digest must land before ~08:00 in Jersey (UTC+1 in summer,
# UTC in winter). GitHub delays on-the-hour crons heavily (the old build's
# 06:00 UTC cron often started 07:00 to 08:45 UTC), so this runs at 05:17 UTC,
# an off-peak minute. Even with typical delay the run finishes before 07:30
# Jersey time in summer, earlier in winter.

name: daily-scrape

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run tests
        run: |
          python scrapers/tests/test_fx.py
          python scrapers/tests/test_schema.py

      - name: Run daily pipeline
        run: python scrapers/run_daily.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: daily run $(date -u +%F)"
            git push
          fi

  # Pushes made with GITHUB_TOKEN do not trigger other workflows, so the data
  # commit above would never kick off deploy.yml on its own. Call it directly.
  deploy:
    needs: scrape
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
