# Daily pipeline: FX fetch, listing scrapers (per-source isolation), change
# detection, data commit, then site deploy. Digest send is added in M4.
#
# Cron timing: the digest must land before ~08:00 in Jersey (UTC+1 in summer,
# UTC in winter). GitHub delays crons heavily (the first 05:17 UTC run started
# 07:32 UTC, which would be 08:32 Jersey), so this runs at 04:17 UTC: even
# with a two-hour delay the digest lands before 07:30 Jersey year-round.

name: daily-scrape

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run tests
        run: |
          python scrapers/tests/test_fx.py
          python scrapers/tests/test_schema.py
          python scrapers/tests/test_king_cab.py
          python scrapers/tests/test_listings.py
          python scrapers/tests/test_tier2.py
          python scrapers/tests/test_japan.py
          python scrapers/tests/test_isolation.py
          python scrapers/tests/test_digest.py

      - name: Run daily pipeline
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python scrapers/run_daily.py

      # continue-on-error so a mail failure cannot discard the day's data
      # commit below; the last step re-fails the run so the owner still gets
      # GitHub's failure email (the PRD's alerting path for a dead digest).
      - name: Build and send digest (dry run until DIGEST_LIVE=1)
        id: digest
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_LIVE: ${{ vars.DIGEST_LIVE }}
        run: python emailer/send_digest.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: daily run $(date -u +%F)"
            # main may have advanced since checkout (manual commits, deploys)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed, retrying"
              sleep $((i * 5))
            done
          fi

      # Dead-man's switch: healthchecks.io emails the owner if this ping goes
      # quiet, catching the failure mode where the cron itself stops firing.
      # No-op until the HEALTHCHECK_PING_URL secret exists.
      - name: Heartbeat ping
        env:
          PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "$PING_URL" ]; then
            curl -fsS -m 10 --retry 3 "$PING_URL" >/dev/null && echo "heartbeat sent"
          else
            echo "no ping URL configured, skipping"
          fi

      - name: Surface digest failure
        if: steps.digest.outcome == 'failure'
        run: |
          echo "Digest send failed; data was still committed. See the digest step log."
          exit 1

  # Pushes made with GITHUB_TOKEN do not trigger other workflows, so the data
  # commit above would never kick off deploy.yml on its own. Call it directly.
  deploy:
    needs: scrape
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
