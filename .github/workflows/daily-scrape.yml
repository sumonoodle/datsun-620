# Daily pipeline: FX fetch, listing scrapers (per-source isolation), change
# detection, data commit, then site deploy. Digest send is added in M4.
#
# Cron timing: the digest must land before ~08:00 in Jersey (UTC+1 in summer,
# UTC in winter). GitHub delays crons heavily (the first 05:17 UTC run started
# 07:32 UTC, which would be 08:32 Jersey), so this runs at 04:17 UTC: even
# with a two-hour delay the digest lands before 07:30 Jersey year-round.

name: daily-scrape

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run tests
        run: |
          python scrapers/tests/test_fx.py
          python scrapers/tests/test_schema.py
          python scrapers/tests/test_king_cab.py
          python scrapers/tests/test_listings.py
          python scrapers/tests/test_tier2.py
          python scrapers/tests/test_isolation.py
          python scrapers/tests/test_digest.py

      - name: Run daily pipeline
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scrapers/run_daily.py

      - name: Build and send digest (dry run until DIGEST_LIVE=1)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_LIVE: ${{ vars.DIGEST_LIVE }}
        run: python emailer/send_digest.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: daily run $(date -u +%F)"
            git push
          fi

  # Pushes made with GITHUB_TOKEN do not trigger other workflows, so the data
  # commit above would never kick off deploy.yml on its own. Call it directly.
  deploy:
    needs: scrape
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
