name: Listings check

# Daily listings sweep. Fetches FX, runs the collectors (sources without
# credentials or that block scraping are skipped and flagged), reconciles into
# the store with change detection, writes the data, and notifies on change.
# Email send is dry-run until GMAIL_* secrets exist AND NOTIFY_LIVE is "1".

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC (07:00 Jersey in summer)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run tests
        run: |
          python scrapers/tests/test_king_cab.py
          python scrapers/tests/test_listings.py

      - name: Run listings refresh
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_LIVE: ${{ vars.NOTIFY_LIVE }}
        run: python scrapers/run_listings.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/listings-changes.json data/listings-report.json data/fx-rates.json data/snapshots data/digest-latest.html
          git commit -m "data: listings refresh" || echo "no changes"
          git push
