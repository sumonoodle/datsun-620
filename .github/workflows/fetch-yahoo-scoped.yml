# One-off: prove Yahoo's whole-vehicle category id against real pages
# before the all-620s collector update trusts it. Deleted after use.
name: fetch-yahoo-scoped

on:
  push:
    branches:
      - claude/datsun-620-kickoff-ah5cyw
    paths:
      - scrapers/experiments/fetch_yahoo_scoped.py

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Fetch pages
        run: python scrapers/experiments/fetch_yahoo_scoped.py
      - name: Commit fetched pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/pages
          git diff --cached --quiet && exit 0
          git commit -m "research: Yahoo category-scoped search pages"
          for i in 1 2 3 4; do
            git push && exit 0
            git pull --rebase || git rebase --abort
            sleep $((2 ** i))
          done
          git push
