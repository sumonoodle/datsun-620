# Research scaffolding: fetch real search pages for the deep-dive
# collectors. Same lifecycle as the Asia fetch rounds: runs when the fetch
# script changes on the dev branch, commits gzipped pages back, deleted
# once the collectors ship.
name: fetch-pages

on:
  push:
    branches:
      - claude/datsun-620-kickoff-ah5cyw
    paths:
      - scrapers/experiments/fetch_pages.py
      - .github/workflows/fetch-pages.yml

permissions:
  contents: write

concurrency:
  group: fetch-pages
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Fetch pages
        run: python scrapers/experiments/fetch_pages.py

      - name: Commit fetched pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/pages
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "research: fetched deep-dive collector search pages"
          for i in 1 2 3 4; do
            git push && exit 0
            git pull --rebase || git rebase --abort
            sleep $((2 ** i))
          done
          git push
